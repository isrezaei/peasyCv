# Production stack for the PeasyCV studio: Postgres + NestJS API + Next.js app.
#
#   1. cp .env.docker.example .env                 # compose-level vars (DB, ports, public API URL)
#   2. cp deploy/backend.env.example deploy/backend.env   # backend app config (secrets, URLs, storage)
#   3. edit both files, then:
#   4. docker compose -f docker-compose.prod.yml up -d --build
#
# The frontend's NEXT_PUBLIC_API_URL is baked at build time, so after changing it
# rebuild the frontend image (`--build`).
name: peasycv-studio

services:
  postgres:
    image: postgres:16-alpine
    container_name: peasycv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resume}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resume_password}
      POSTGRES_DB: ${POSTGRES_DB:-resume_builder}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resume} -d ${POSTGRES_DB:-resume_builder}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not published to the host by default — the API reaches it over the internal
    # compose network. Uncomment to inspect the DB from the host.
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: peasycv-backend
    container_name: peasycv_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./deploy/backend.env
    environment:
      # Assembled here from the shared POSTGRES_* vars so the DB credentials live
      # in ONE place (the root .env). Overrides anything in backend.env.
      DATABASE_URL: postgresql://${POSTGRES_USER:-resume}:${POSTGRES_PASSWORD:-resume_password}@postgres:5432/${POSTGRES_DB:-resume_builder}?schema=public
      NODE_ENV: production
      PORT: "4000"
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      # Persist local-storage uploads (only used when STORAGE_PROVIDER=local).
      - backend_uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Inlined into the client bundle at build time.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    image: peasycv-frontend
    container_name: peasycv_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
  backend_uploads:
